name: RAG CI Check

on: [push, pull_request]

jobs:
  ci-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install lightweight dependencies
        run: pip install pyyaml

      - name: Run CI checks
        run: python ci_check.py